spring.application.name=auction-service
server.port=8080

# DataSource (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/auction_db
spring.datasource.username=auction
spring.datasource.password=auction
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
# ddl-auto=none: Flyway owns the schema — Hibernate must not validate or create tables at startup
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false


# Kafka
spring.kafka.bootstrap-servers=localhost:9092

# Jackson — Spring Boot 4 uses Jackson 3.x (tools.jackson); Java time support is built-in
spring.jackson.deserialization.FAIL_ON_UNKNOWN_PROPERTIES=false
